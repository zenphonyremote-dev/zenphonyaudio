/* ════════════════════════════════════════════════════════════════════════
   AUTH SCREEN — login & signup
   ════════════════════════════════════════════════════════════════════════ */
function AuthScreen({ mode, setMode, onSignIn }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [name, setName] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [info, setInfo] = useState('');

  // Reset error/info when switching mode
  useEffect(() => { setError(''); setInfo(''); }, [mode]);

  const handleSubmit = async (e) => {
    if (e && e.preventDefault) e.preventDefault();
    setError(''); setInfo('');
    if (!email || !password || (mode === 'signup' && !name)) {
      setError('Please fill out every field.'); return;
    }
    // Preview-mode shortcut: don't call cross-origin Vercel API. Just enter the dashboard.
    const IS_PROD = window.location.origin === window.APP_BASE_URL;
    if (!IS_PROD) { onSignIn && onSignIn(); return; }
    setLoading(true);
    try {
      const path = mode === 'signin' ? '/api/auth/sign-in/email' : '/api/auth/sign-up/email';
      const body = mode === 'signin' ? { email, password } : { email, password, name };
      const res = await window.api(path, { method: 'POST', body: JSON.stringify(body) });
      if (res.ok) { window.location.reload(); return; }
      let msg = 'Something went wrong. Please try again.';
      try {
        const j = await res.json();
        if (j && j.message) msg = j.message;
        if (mode === 'signup' && /exist/i.test(msg)) msg = 'Email already registered, sign in instead.';
        if (mode === 'signin' && res.status === 401) msg = 'Wrong email or password.';
      } catch (_) {}
      setError(msg);
    } catch (err) {
      setError('Network error. Check your connection and try again.');
    } finally { setLoading(false); }
  };

  const handleGoogle = () => {
    const IS_PROD = window.location.origin === window.APP_BASE_URL;
    if (!IS_PROD) { onSignIn && onSignIn(); return; }
    const cb = encodeURIComponent(window.APP_BASE_URL + '/account');
    window.location.href = window.APP_BASE_URL + '/api/auth/sign-in/social/google?callbackURL=' + cb;
  };

  const handleForgot = async (e) => {
    if (e && e.preventDefault) e.preventDefault();
    setError(''); setInfo('');
    if (!email) { setError('Enter your email above first.'); return; }
    setLoading(true);
    try {
      const res = await window.api('/api/auth/forget-password', {
        method: 'POST',
        body: JSON.stringify({ email, redirectTo: window.APP_BASE_URL + '/reset-password' })
      });
      if (res.ok) setInfo('Check your email for a reset link.');
      else setError('Could not send reset email. Try again.');
    } catch (_) {
      setError('Network error. Try again.');
    } finally { setLoading(false); }
  };

  return (
    <div className="auth-shell">
      <form className="auth-card glass" onSubmit={handleSubmit} noValidate>
        <div className="auth-card-head">
          <AppBrandMark />
          <a href="/" className="auth-back">← Back to site</a>
        </div>

        <h1 className="auth-title">
          {mode === 'signin' ? 'Welcome back.' : 'Create your account.'}
        </h1>
        <p className="auth-sub">
          {mode === 'signin'
            ? 'Sign in to keep listening. Your sessions are right where you left them.'
            : 'Start a free trial. Install Listen Buddy on your DAW in under a minute.'}
        </p>

        <div className="auth-tabs">
          <div className={`auth-tab ${mode === 'signin' ? 'active' : ''}`} onClick={() => setMode('signin')}>Sign in</div>
          <div className={`auth-tab ${mode === 'signup' ? 'active' : ''}`} onClick={() => setMode('signup')}>Create account</div>
        </div>

        {mode === 'signup' && (
          <div className="field">
            <label className="field-label">Full name</label>
            <input className="field-input" placeholder="Maya Reyes" value={name} onChange={(e) => setName(e.target.value)} autoComplete="name" />
          </div>
        )}

        <div className="field">
          <label className="field-label">Email</label>
          <input className="field-input" type="email" placeholder="you@studio.com" value={email} onChange={(e) => setEmail(e.target.value)} autoComplete="email" />
        </div>

        <div className="field">
          <label className="field-label">Password</label>
          <input className="field-input" type="password" placeholder="••••••••••••" value={password || (mode === 'signin' ? '••••••••••••' : '')} onChange={(e) => setPassword(e.target.value)} autoComplete={mode === 'signin' ? 'current-password' : 'new-password'} />
        </div>

        <div className="field-row">
          <label className="field-check">
            <input type="checkbox" defaultChecked={mode === 'signin'} />
            <span className="box">✓</span>
            <span>{mode === 'signin' ? 'Stay signed in' : 'Email me beta updates'}</span>
          </label>
          {mode === 'signin' && <a href="#" onClick={handleForgot} style={{ cursor: 'pointer' }}>Forgot password?</a>}
        </div>

        {error && <div className="auth-msg auth-msg-error" role="alert" style={{ color: '#ff8a8a', fontSize: 13, marginTop: 4, marginBottom: -4 }}>{error}</div>}
        {info && <div className="auth-msg auth-msg-info" style={{ color: '#9bd1a8', fontSize: 13, marginTop: 4, marginBottom: -4 }}>{info}</div>}

        <button type="submit" className="auth-submit" disabled={loading}>
          {loading ? (mode === 'signin' ? 'Signing in…' : 'Creating account…') : (mode === 'signin' ? 'Sign in' : 'Create account')}
        </button>

        <div className="auth-divider">or continue with</div>
        <div className="oauth-row">
          <button type="button" className="oauth-btn" onClick={handleGoogle}>
            <svg viewBox="0 0 24 24"><path fill="#fff" d="M21.35 11.1H12v2.85h5.35c-.23 1.5-1.7 4.4-5.35 4.4-3.22 0-5.85-2.67-5.85-5.95s2.63-5.95 5.85-5.95c1.83 0 3.06.78 3.76 1.45l2.57-2.47C16.7 3.93 14.55 3 12 3 6.92 3 2.8 7.13 2.8 12.4S6.92 21.8 12 21.8c6.93 0 9.55-4.85 9.55-7.34 0-.5-.05-.88-.2-1.36z"/></svg>
            Google
          </button>
          <button type="button" className="oauth-btn">
            <svg viewBox="0 0 24 24"><path fill="#fff" d="M16.7 1.66c0 1.18-.42 2.32-1.13 3.13-.74.85-2 1.5-3.04 1.43-.13-1.13.42-2.32 1.1-3.07.78-.85 2.05-1.5 3.07-1.5zM20.4 17.2c-.6 1.4-1.34 2.78-2.5 2.8-1.13.03-1.5-.66-2.8-.66-1.3 0-1.7.65-2.78.7-1.13.04-2-1.5-2.6-2.86-1.24-2.7-2.2-7.66.92-11.04.95-1 2.34-1.65 3.74-1.65 1.13 0 2.2.74 2.86.74.66 0 1.94-.92 3.27-.78.55.03 2.1.2 3.1 1.66-2.65 1.7-2.36 5.74.43 7.3-.55 1.5-.92 1.66-1.64 3.8z"/></svg>
            Apple
          </button>
          <button type="button" className="oauth-btn">
            <svg viewBox="0 0 24 24"><path fill="#fff" d="M12 2C6.5 2 2 6.6 2 12.2c0 4.5 2.87 8.3 6.84 9.65.5.1.68-.22.68-.49 0-.24-.01-.88-.01-1.72-2.78.62-3.37-1.36-3.37-1.36-.45-1.18-1.1-1.5-1.1-1.5-.91-.63.07-.62.07-.62 1 .07 1.53 1.05 1.53 1.05.9 1.55 2.34 1.1 2.91.84.1-.66.35-1.1.63-1.36-2.22-.26-4.55-1.13-4.55-5.04 0-1.1.39-2.02 1.03-2.74-.1-.26-.45-1.3.1-2.7 0 0 .84-.27 2.75 1.05.8-.23 1.65-.34 2.5-.34s1.7.11 2.5.34c1.91-1.32 2.75-1.05 2.75-1.05.55 1.4.2 2.44.1 2.7.64.72 1.03 1.64 1.03 2.74 0 3.92-2.34 4.78-4.57 5.03.36.32.68.94.68 1.9 0 1.37-.01 2.48-.01 2.82 0 .27.18.6.69.49C19.13 20.5 22 16.7 22 12.2 22 6.6 17.5 2 12 2z"/></svg>
            GitHub
          </button>
        </div>

        <div className="auth-foot">
          {mode === 'signin'
            ? <>Don't have an account? <a onClick={() => setMode('signup')} style={{ cursor: 'pointer' }}>Start a free trial →</a></>
            : <>Already have a license? <a onClick={() => setMode('signin')} style={{ cursor: 'pointer' }}>Sign in →</a></>
          }
        </div>
      </form>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════════════
   ACCOUNT HEADER — slim top bar shared across settings views
   ════════════════════════════════════════════════════════════════════════ */
function AccountHeader({ user, onSignOut, section, setSection }) {
  // Fetch profile so the plan chip reflects the actual user, not a hardcoded value.
  const [profile, setProfile] = useState(null);
  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const res = await window.api('/api/profile');
        if (!res.ok) return;
        const j = await res.json();
        if (!cancelled && j && j.profile) setProfile(j.profile);
      } catch (_) {}
    })();
    return () => { cancelled = true; };
  }, []);
  const planId = profile?.subscription_plan || 'free';
  const planLabel = { free: 'Free', basic: 'Basic', pro: 'Pro', max: 'Max' }[planId] || 'Free';
  const period = profile?.subscription_period === 'yearly' ? 'yearly' : 'monthly';
  const isFree = planId === 'free';
  return (
    <header className="acct-head">
      <BrandMark />
      <div className="acct-section-toggle" role="tablist" aria-label="Section">
        <button className={section === 'account' ? 'active' : ''} onClick={() => setSection('account')}>Account</button>
        <button className={section === 'forum' ? 'active' : ''} onClick={() => setSection('forum')}>Community</button>
      </div>
      <div className="acct-head-spacer"></div>
      <a href="/" className="acct-head-link">Back to site</a>
      <div className="acct-head-user">
        <Initials name={user} size={32} />
        <div className="who">
          <div className="name">{user}</div>
          <div className="plan-chip" title={isFree ? 'Free plan' : `${planLabel} plan · ${period}`}>
            <span className="plan-chip-glyph" aria-hidden="true">
              <svg viewBox="0 0 12 12" width="10" height="10"><path d="M6 1 L11 6 L6 11 L1 6 Z" fill="currentColor"/></svg>
            </span>
            <span className="plan-chip-tier">{planLabel}</span>
            {!isFree && <><span className="plan-chip-sep">·</span><span className="plan-chip-cycle">{period}</span></>}
          </div>
        </div>
      </div>
      <button className="btn-secondary" onClick={onSignOut} title="Sign out"><Icon name="out" /> Sign out</button>
    </header>
  );
}

/* ════════════════════════════════════════════════════════════════════════
   DEVICES TAB — live machines from /api/plugin/machines/list
   ════════════════════════════════════════════════════════════════════════ */
function DevicesTab({ profile }) {
  const [machines, setMachines] = useState(null);
  const [machineLimit, setMachineLimit] = useState(null);
  const [revokingHash, setRevokingHash] = useState(null);

  const refreshMachines = async () => {
    if (!profile?.api_key) { setMachines([]); setMachineLimit(0); return; }
    try {
      const r = await fetch(`/api/plugin/machines/list?api_key=${encodeURIComponent(profile.api_key)}`);
      const j = await r.json();
      if (j && j.success) {
        setMachines(j.machines || []);
        setMachineLimit(j.machine_limit || 1);
      } else {
        setMachines([]);
        setMachineLimit(0);
      }
    } catch (_) {
      setMachines([]);
      setMachineLimit(0);
    }
  };
  useEffect(() => { refreshMachines(); }, [profile?.api_key]);

  const handleRevoke = async (hash) => {
    if (!profile?.api_key || !hash) return;
    if (!window.confirm('Deactivate this Mac? Listen Buddy will stop authenticating on it until you activate again.')) return;
    setRevokingHash(hash);
    try {
      await fetch('/api/plugin/machines/revoke', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ api_key: profile.api_key, machine_id_hash: hash })
      });
      await refreshMachines();
    } catch (_) {}
    setRevokingHash(null);
  };

  const machineList = machines || [];
  const headerLabel = machineList.length === 0
    ? '▎ Devices · None activated yet'
    : `▎ Devices · ${machineList.length} of ${machineLimit || 1} active`;

  return (
    <div className="set-section glass">
      <div className="set-section-h">
        <div className="label">{headerLabel}</div>
        <h3 className="lb-h3">
          Where <img className="lb-inline-wordmark" src="assets/listen-buddy-wordmark.svg" alt="Listen Buddy" /> is installed
        </h3>
      </div>
      {machines === null && (
        <div style={{ color: 'var(--muted-foreground)', fontSize: 13, padding: '12px 0' }}>Checking…</div>
      )}
      {machines !== null && machineList.length === 0 && (
        <div style={{ color: 'var(--muted-foreground)', fontSize: 13, padding: '12px 0', lineHeight: 1.5 }}>
          You haven't activated Listen Buddy on any Macs yet. Download the Software Hub
          from the Downloads tab, sign in with this account, and click <strong>Activate this Mac</strong>.
        </div>
      )}
      {machineList.map((d) => {
        const niceTime = d.last_seen_at ? new Date(d.last_seen_at).toLocaleString() : '—';
        const meta = `${d.source === 'hub' ? 'Hub' : 'Plugin'} · v${d.app_version || '?'} · last seen ${niceTime}`;
        const isRevoking = revokingHash === d.machine_id_hash;
        return (
          <div className="device" key={d.machine_id_hash}>
            <div className="icon"><Icon name="laptop" /></div>
            <div>
              <div className="name">{d.hostname || 'Unnamed Mac'}</div>
              <div className="info">{meta}</div>
            </div>
            <div style={{ display: 'flex', gap: 8 }}>
              <button className="btn-secondary"
                      disabled={isRevoking}
                      onClick={() => handleRevoke(d.machine_id_hash)}>
                {isRevoking ? 'Deactivating…' : 'Deactivate'}
              </button>
            </div>
          </div>
        );
      })}
      <div style={{ marginTop: 16, paddingTop: 16, borderTop: '1px solid rgba(255,255,255,0.06)', fontSize: 12, color: 'var(--muted-foreground)' }}>
        Devices are activated from inside the Software Hub on each Mac.
      </div>
    </div>
  );
}

/* IANA time-zone list — modern browsers expose all ~430 zones via
   Intl.supportedValuesOf; older ones get a curated common-zone fallback. */
const TIMEZONES = (() => {
  try {
    if (typeof Intl !== 'undefined' && typeof Intl.supportedValuesOf === 'function') {
      const list = Intl.supportedValuesOf('timeZone');
      if (list && list.length) return list;
    }
  } catch (_) {}
  return [
    'Pacific/Honolulu','America/Anchorage','America/Los_Angeles','America/Denver',
    'America/Phoenix','America/Chicago','America/New_York','America/Toronto',
    'America/Halifax','America/Sao_Paulo','Atlantic/Azores','Europe/London',
    'Europe/Paris','Europe/Berlin','Europe/Athens','Europe/Moscow',
    'Africa/Cairo','Africa/Johannesburg','Asia/Dubai','Asia/Kolkata',
    'Asia/Bangkok','Asia/Singapore','Asia/Shanghai','Asia/Tokyo','Asia/Seoul',
    'Australia/Perth','Australia/Sydney','Pacific/Auckland','UTC'
  ];
})();

function guessTimeZone() {
  try { return Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC'; }
  catch (_) { return 'UTC'; }
}

function Settings({ user, sessionEmail, theme, setTheme, settingsTab, setSettingsTab, onSignOut }) {
  // Billing/usage data fetched from API.
  const [subDetails, setSubDetails] = useState(null);
  const [billingHistory, setBillingHistory] = useState(null);
  const [usageHistory, setUsageHistory] = useState(null);
  const [billingLoading, setBillingLoading] = useState(false);
  const [busyAction, setBusyAction] = useState(null); // string id of in-flight button
  const [billingError, setBillingError] = useState('');

  // Profile data + edit form. Fetched once on mount; PATCH back on Save.
  const [profile, setProfile] = useState(null);
  const [profileForm, setProfileForm] = useState(null);
  const [profileSaving, setProfileSaving] = useState(false);
  const setField = (k, v) => setProfileForm(f => ({ ...(f || {}), [k]: v }));
  const profileDirty = (() => {
    if (!profile || !profileForm) return false;
    return ['full_name','handle','bio','company','timezone'].some(
      k => (profileForm[k] || '') !== (profile[k] || '')
    );
  })();

  // Lightweight inline toast.
  const showToast = (msg, kind) => {
    const t = document.createElement('div');
    t.textContent = msg;
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);'
      + 'padding:12px 18px;border-radius:10px;background:' + (kind === 'error' ? 'rgba(120,20,30,.95)' : 'rgba(20,20,28,.95)') + ';'
      + 'color:#fff;font:500 14px/1.4 var(--font-body,Inter,sans-serif);'
      + 'box-shadow:0 8px 32px rgba(0,0,0,.4);z-index:9999;';
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  };

  // Load billing/usage when entering those tabs.
  useEffect(() => {
    if (settingsTab !== 'billing' && settingsTab !== 'usage') return;
    let cancelled = false;
    (async () => {
      setBillingLoading(true);
      setBillingError('');
      try {
        const [subRes, histRes, usageRes] = await Promise.all([
          window.api('/api/subscription-details'),
          window.api('/api/billing-history'),
          window.api('/api/usage-history')
        ]);
        if (cancelled) return;
        if (subRes.ok)   setSubDetails(await subRes.json());
        if (histRes.ok)  setBillingHistory(await histRes.json());
        if (usageRes.ok) setUsageHistory(await usageRes.json());
      } catch (e) {
        if (!cancelled) setBillingError('Could not load billing data.');
      } finally {
        if (!cancelled) setBillingLoading(false);
      }
    })();
    return () => { cancelled = true; };
  }, [settingsTab]);

  // Checkout for plan changes / top-ups.
  const startCheckout = async (body, actionId) => {
    setBusyAction(actionId);
    try {
      const res = await window.api('/api/checkout', {
        method: 'POST',
        body: JSON.stringify({ ...body, email: sessionEmail || undefined })
      });
      if (!res.ok) throw new Error('Checkout failed (' + res.status + ')');
      const j = await res.json();
      if (j && j.url) window.location.href = j.url;
      else throw new Error('No URL returned');
    } catch (err) {
      console.error('[checkout]', err);
      showToast('Could not start checkout. Please try again.', 'error');
      setBusyAction(null);
    }
  };

  const downgradeTo = async (planId, actionId) => {
    setBusyAction(actionId);
    try {
      const res = await window.api('/api/subscription/downgrade', {
        method: 'POST',
        body: JSON.stringify({ planId })
      });
      if (!res.ok) throw new Error('Downgrade failed (' + res.status + ')');
      showToast('Downgrade scheduled. Takes effect at next renewal.');
      // Reload subscription data
      try {
        const r = await window.api('/api/subscription-details');
        if (r.ok) setSubDetails(await r.json());
      } catch (_) {}
    } catch (err) {
      console.error('[downgrade]', err);
      showToast('Could not schedule downgrade.', 'error');
    } finally { setBusyAction(null); }
  };

  const [toggles, setToggles] = useState({
    notifyInsights: true,
    notifyReports: true,
    notifyMarketing: false,
    autoSnapshot: true,
    soundOn: false,
    publicProfile: true
  });
  const flip = (k) => setToggles(t => ({ ...t, [k]: !t[k] }));

  // Fetch profile once on mount.
  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const res = await window.api('/api/profile');
        if (!res.ok || cancelled) return;
        const j = await res.json();
        if (cancelled || !j.profile) return;
        setProfile(j.profile);
        setProfileForm({
          full_name: j.profile.full_name || '',
          handle:    j.profile.handle    || '',
          bio:       j.profile.bio       || '',
          company:   j.profile.company   || '',
          timezone:  j.profile.timezone  || guessTimeZone(),
        });
      } catch (_) { /* leave profile null */ }
    })();
    return () => { cancelled = true; };
  }, []);

  const cancelProfileEdit = () => {
    if (!profile) return;
    setProfileForm({
      full_name: profile.full_name || '',
      handle:    profile.handle    || '',
      bio:       profile.bio       || '',
      company:   profile.company   || '',
      timezone:  profile.timezone  || guessTimeZone(),
    });
  };

  const saveProfile = async () => {
    if (!profileForm || !profileDirty || profileSaving) return;
    setProfileSaving(true);
    try {
      const patch = {};
      for (const k of ['full_name','handle','bio','company','timezone']) {
        if ((profileForm[k] || '') !== (profile?.[k] || '')) {
          patch[k] = profileForm[k] || null;
        }
      }
      const res = await window.api('/api/profile', {
        method: 'PATCH',
        body: JSON.stringify(patch),
      });
      if (!res.ok) {
        const j = await res.json().catch(() => ({}));
        const msg = j.error === 'handle_taken'    ? 'That handle is already taken.'
                  : j.error === 'invalid_timezone' ? 'Invalid time zone selected.'
                  : (typeof j.error === 'string' && j.error)
                    || ('Save failed (' + res.status + ')');
        throw new Error(msg);
      }
      const j = await res.json();
      setProfile(j.profile);
      setProfileForm({
        full_name: j.profile.full_name || '',
        handle:    j.profile.handle    || '',
        bio:       j.profile.bio       || '',
        company:   j.profile.company   || '',
        timezone:  j.profile.timezone  || guessTimeZone(),
      });
      showToast('Profile saved.');
    } catch (err) {
      console.error('[saveProfile]', err);
      showToast(err.message || 'Could not save profile.', 'error');
    } finally {
      setProfileSaving(false);
    }
  };

  return (
    <div className="app-main">
      <div className="app-topbar">
        <div>
          <h1>Account</h1>
          <div className="sub">Identity, devices, and billing for your Zenphony Audio account.</div>
        </div>
        <div className="spacer"></div>
        <button
          className="btn-secondary"
          onClick={cancelProfileEdit}
          disabled={!profileDirty || profileSaving}
          style={{ opacity: profileDirty && !profileSaving ? 1 : 0.5, cursor: profileDirty && !profileSaving ? 'pointer' : 'default' }}
        >Cancel</button>
        <button
          className="btn btn-primary"
          onClick={saveProfile}
          disabled={!profileDirty || profileSaving}
          style={{ opacity: profileDirty && !profileSaving ? 1 : 0.5, cursor: profileDirty && !profileSaving ? 'pointer' : 'default' }}
        >{profileSaving ? 'Saving…' : 'Save changes'}</button>
      </div>

      {/* Profile hero */}
      <div className="profile-hero glass">
        <div className="profile-avatar">
          <div className="inner">{((profile?.full_name || user) || '').split(/\s+/).filter(Boolean).map(s => s[0]).join('').slice(0,2).toUpperCase() || 'U'}</div>
        </div>
        <div className="profile-meta">
          <h1>{profile?.full_name || user}</h1>
          <div className="handle">{profile?.handle ? '@' + profile.handle + ' · ' : ''}{sessionEmail || profile?.email || ''}</div>
          <div className="tags">
            <span className="profile-tag"><span className="dot"></span> {({ free: 'Free', basic: 'Basic', pro: 'Pro', max: 'Max' }[profile?.subscription_plan] || 'Free')} plan</span>
            {profile?.created_at && (
              <span className="profile-tag">Joined {new Date(profile.created_at).toLocaleString('en-US', { month: 'short', year: 'numeric' })}</span>

          </div>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8, alignItems: 'flex-end' }}>
          <button className="btn-secondary"><Icon name="download" /> Export data</button>
          <button className="btn-secondary">Change avatar</button>
        </div>
      </div>

      {/* Tabs */}
      <div className="settings-tabs glass-tight">
        {['profile','devices','downloads','billing','usage','security'].map(tab => (

      </div>

      {settingsTab === 'profile' && (
        <div className="settings-grid">

                       onClick={() => setTheme(t)}>
                    <span className="label">{t}</span>
                  </div>
                ))}
              </div>
            </div>
            <div className="set-section glass">
              <div className="set-section-h">
                <div className="label">▎ Listening defaults</div>
                <h3>How Buddy starts a session</h3>
              </div>
              <div className="set-row">
                <div className="text">
                  <div className="name">Default analysis mode</div>
                  <div className="desc">Mix Mode. Broad mix critique with reference matching.</div>
                </div>
                <button className="btn-secondary">Change…</button>
              </div>
              <div className="set-row">
                <div className="text">
                  <div className="name">Default QC standard</div>
                  <div className="desc">No QC. Pick per-session.</div>
                </div>
                <button className="btn-secondary">Change…</button>
              </div>
              <div className="set-row">
                <div className="text">
                  <div className="name">Auto-snapshot every analysis</div>
                  <div className="desc">Save spectrogram + LUFS + impression to history automatically.</div>
                </div>
                <div className={`toggle ${toggles.autoSnapshot ? 'on' : ''}`} onClick={() => flip('autoSnapshot')}></div>
              </div>
              <div className="set-row">
                <div className="text">
                  <div className="name">Buddy voice (audio)</div>
                  <div className="desc">Buddy reads its impression aloud after analysis. Off by default.</div>

                <div className={`toggle ${toggles.soundOn ? 'on' : ''}`} onClick={() => flip('soundOn')}></div>
              </div>
            </div>
          </div>
        </div>
      )}

      {settingsTab === 'devices' && <DevicesTab profile={profile} />}

      {settingsTab === 'downloads' && (
        <div style={{display:'flex',flexDirection:'column',gap:24}}>
        <div className="set-section glass hub-dl-card">
          <div className="set-section-h">
            <div className="label">▎ Desktop app</div>
            <h3>Zenphony Audio Software Hub</h3>
            <p className="set-section-sub">One installer, all your buddies. Manages plugin updates, license, and on‑device engines from a single tray app.</p>
          </div>
          <div className="hub-dl-row">
            <div className="hub-dl-info">
              <div className="hub-dl-ver">v0.2.1 <span className="hub-dl-tag">stable</span></div>
              <div className="hub-dl-meta">Released May 11 · 5.9 MB · macOS 12+ · Apple Silicon</div>
            </div>
            <div className="hub-dl-actions">
              <a className="btn btn-primary"
                 href="https://pub-6f4f14672e1b4c9e9ac504c2ca986ea7.r2.dev/ZenphonyAudioHub-0.2.1-arm64.dmg"
                 download>
                <Icon name="download" /> Download for macOS
              </a>
            </div>
          </div>
          <div className="hub-dl-foot">
            <a className="link" href="https://pub-6f4f14672e1b4c9e9ac504c2ca986ea7.r2.dev/manifest.json" target="_blank" rel="noopener">Release notes</a>
            {' · '}
            <span className="link" style={{opacity:0.6}}>Older builds</span>
            {' · '}
            <span className="link" title="SHA-256: 7c71d700a416172e8a165b44e5c0f6ce260f44cf0e287b0f763f21827d16b982" style={{cursor:'help'}}>Verify checksum</span>
          </div>
        </div>

      )}

      {settingsTab === 'billing' && (() => {
        const plans = [
          { id: 'free',  name: 'Free',  price: 0,     minutes: 10,  blurb: 'Try the local DSP, no card required.' },
          { id: 'basic', name: 'Basic', price: 7.99,  minutes: 60,  blurb: 'For the casual mixer. An hour a month.' },
          { id: 'pro',   name: 'Pro',   price: 29.99, minutes: 240, blurb: 'Built for working sessions. Four hours.' },
          { id: 'max',   name: 'Max',   price: 69.99, minutes: 700, blurb: 'Studio-grade headroom plus priority support.' }

        const currentPlanId = profile?.subscription_plan || 'free';
        const currentIdx = Math.max(0, plans.findIndex(p => p.id === currentPlanId));
        const currentPlan = plans[currentIdx];

                {!isFree && <button className="b2-btn b2-btn-quiet b2-btn-danger">Cancel plan</button>}

            ].map((iv, i) => (
              <div key={i} className="bill2-card bill2-invoice">

      })()}

      {settingsTab === 'usage' && (() => {
        // Mock 30-day usage series (minutes per day). Total ≈ 142 min over 30 days.
        // Real data from profile. New accounts = all zeros, no fake history.
        const usageDaily = (profile?.usage_daily && profile.usage_daily.length === 30)
          ? profile.usage_daily
          : new Array(30).fill(0);
        const totalMonth = profile?.listening_minutes_used || 0;
        const last90Avg = profile?.last_90d_avg || 0;
        const peak = profile?.peak_month_minutes || 0;
        const limit = profile?.listening_minutes_limit ||
          ({ free: 5, basic: 30, pro: 120, max: 350 }[profile?.subscription_plan] || 5);
        const max = Math.max(...usageDaily, 12);
        const W = 660, H = 180, PAD = { l: 36, r: 16, t: 14, b: 24 };
        const innerW = W - PAD.l - PAD.r, innerH = H - PAD.t - PAD.b;
        const xAt = (i) => PAD.l + (i / (usageDaily.length - 1)) * innerW;
        const yAt = (v) => PAD.t + innerH - (v / max) * innerH;
        const linePts = usageDaily.map((v,i) => `${xAt(i)},${yAt(v)}`).join(' ');
        const areaPts = `${PAD.l},${PAD.t + innerH} ${linePts} ${PAD.l + innerW},${PAD.t + innerH}`;
        const limitY = yAt(Math.min(limit/30 * 1.5, max)); // visual ref line for daily-equiv
        const yTicks = [0, Math.round(max * 0.5), max];

        // Plan comparison
        const plans = [
          { id: 'free',  name: 'Free',  minutes: 10,  price: 0,     msgs: 'Generous monthly Listen Buddy chat' },
          { id: 'basic', name: 'Basic', minutes: 60,  price: 7.99,  msgs: 'Unlimited Listen Buddy chat' },
          { id: 'pro',   name: 'Pro',   minutes: 240, price: 29.99, msgs: 'Unlimited Listen Buddy chat' },
          { id: 'max',   name: 'Max',   minutes: 700, price: 69.99, msgs: 'Unlimited Listen Buddy chat' }
        ];
        const planMaxMin = 700;
        const currentPlanId = profile?.subscription_plan || 'free';
        const recommendedPlanId = currentPlanId; // No recommendation engine yet — show current as recommended

        return (
          <div className="settings-grid usage-grid">

            {/* Plan + headline numbers */}
            <div className="set-section glass usage-summary">
              <div className="set-section-h">
                <div className="label">▎ This month</div>
                <h3>{totalMonth} of {limit} minutes</h3>
                <p>30-day rolling · {({ free: 'Free', basic: 'Basic', pro: 'Pro', max: 'Max' }[currentPlanId] || 'Free')} plan{currentPlanId !== 'free' ? ` · $${({ free: 0, basic: 7.99, pro: 29.99, max: 69.99 }[currentPlanId])}/mo` : ''}</p>
              </div>
              <div className="plan-bar"><div className="fill" style={{ width: `${Math.min(totalMonth/limit*100, 100)}%` }}></div></div>
              <div className="plan-meta">
                <span>{Math.round(totalMonth/limit*100)}% used · {Math.max(limit - totalMonth, 0)} min remaining</span>
                <span>Resets in 11 days</span>
              </div>
              <div className="usage-stat-row">
                <div className="usage-stat">
                  <div className="lbl">90-day avg</div>
                  <div className="val">{last90Avg} <span>min/mo</span></div>
                </div>
                <div className="usage-stat">
                  <div className="lbl">Peak month</div>
                  <div className="val">{peak} <span>min</span></div>
                </div>
                <div className="usage-stat">
                  <div className="lbl">Trend</div>
                  <div className="val trend-up">↑ 9% <span>vs last 90d</span></div>
                </div>
                <div className="usage-stat">
                  <div className="lbl">Sessions</div>
                  <div className="val">22 <span>this month</span></div>
                </div>
              </div>
            </div>

            {/* Usage over time chart */}
            <div className="set-section glass">
              <div className="set-section-h">
                <div className="label">▎ Usage over time</div>
                <h3>Last 30 days</h3>
                <p>Minutes consumed per day. Hover the curve to see a daily breakdown.</p>
              </div>
              <div className="usage-range">
                {['30 days','90 days','12 months'].map((r,i) => (
                  <button key={i} className={`u-range-pill ${i===0 ? 'active' : ''}`}>{r}</button>
                ))}
              </div>
              <div className="usage-chart-wrap">
                <svg viewBox={`0 0 ${W} ${H}`} className="usage-chart" preserveAspectRatio="none">
                  <defs>
                    <linearGradient id="usageFill" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor="var(--primary)" stopOpacity="0.35" />
                      <stop offset="100%" stopColor="var(--primary)" stopOpacity="0" />
                    </linearGradient>
                  </defs>
                  {/* y-grid */}
                  {yTicks.map((tv,i) => (
                    <g key={i}>
                      <line x1={PAD.l} x2={W - PAD.r} y1={yAt(tv)} y2={yAt(tv)} stroke="rgba(255,255,255,0.06)" strokeDasharray="3 4" />
                      <text x={PAD.l - 8} y={yAt(tv) + 4} fontSize="10" fill="rgba(255,255,255,0.4)" textAnchor="end" fontFamily="var(--font-mono)">{tv}</text>
                    </g>
                  ))}
                  {/* area + line */}
                  <polygon points={areaPts} fill="url(#usageFill)" />
                  <polyline points={linePts} fill="none" stroke="var(--primary)" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
                  {/* dots */}
                  {usageDaily.map((v,i) => (
                    <circle key={i} cx={xAt(i)} cy={yAt(v)} r="2.5" fill="var(--primary)" />
                  ))}
                  {/* x-axis labels (every 5th day) */}
                  {usageDaily.map((_,i) => (i % 5 === 0 || i === usageDaily.length-1) && (
                    <text key={`x${i}`} x={xAt(i)} y={H - 6} fontSize="10" fill="rgba(255,255,255,0.4)" textAnchor="middle" fontFamily="var(--font-mono)">
                      {i === 0 ? 'Apr 1' : i === usageDaily.length-1 ? 'today' : `Apr ${i+1}`}
                    </text>
                  ))}
                </svg>
              </div>
              <div className="usage-legend">
                <span><i className="dot dot-primary"></i> Minutes used</span>
                <span><i className="dot dot-cloud"></i> Cloud (50% of total)</span>
                <span><i className="dot dot-local"></i> Local DSP (free, unmetered)</span>
              </div>
            </div>

            {/* Plan comparison */}
            <div className="set-section glass">
              <div className="set-section-h">
                <div className="label">▎ Where you sit</div>
                <h3>Plan comparison</h3>
                <p>Your 90-day average drawn against every tier. The marker is your usage line; the bars are what each plan gives you.</p>
              </div>
              <div className="plan-compare">
                {plans.map(p => {
                  const widthPct = (p.minutes / planMaxMin) * 100;
                  const isCur = p.id === currentPlanId;
                  const isRec = p.id === recommendedPlanId && p.id !== currentPlanId;
                  return (
                    <div key={p.id} className={`pc-row ${isCur ? 'is-current' : ''} ${isRec ? 'is-rec' : ''}`}>
                      <div className="pc-name">
                        {p.name}
                        {isCur && <span className="pc-tag pc-tag-current">Current</span>}
                        {isRec && <span className="pc-tag pc-tag-rec">Recommended</span>}
                      </div>
                      <div className="pc-track">
                        <div className="pc-bar" style={{ width: `${widthPct}%` }}>
                          <span className="pc-bar-num">{p.minutes} min</span>
                        </div>
                      </div>
                      <div className="pc-price">${p.price.toFixed(2)}<span>/mo</span></div>
                    </div>
                  );
                })}
                {/* Avg-usage marker — overlays the track column.
                    Track column starts at 144px (label 130px + 14px gap) and ends at -104px (price 90px + 14px gap). */}
                <div
                  className="pc-avg-marker"
                  style={{ left: `calc(144px + (100% - 248px) * ${last90Avg / planMaxMin})` }}>
                  <div className="pc-avg-line"></div>
                  <div className="pc-avg-label">Your avg · {last90Avg} min</div>
                </div>
              </div>
            </div>

            {/* Recommendation */}
            <div className="set-section glass usage-rec">
              <div className="set-section-h">
                <div className="label">▎ Recommendation</div>
                <h3>Pro is the right plan for you.</h3>
                <p>Confidence: high · based on 90 days of session data.</p>
              </div>
              <div className="rec-body">
                <p>You average <strong>{last90Avg} min/mo</strong>, with a peak of <strong>{peak} min</strong> in March. Pro covers that peak comfortably and you haven't paid for a top-up in the last 90 days.</p>
                <p className="muted">If your usage stays around this level through summer, we'll keep recommending Pro. If two months in a row push past 200 min, we'll suggest Max.</p>
              </div>
              <div className="rec-actions">
                <button className="btn-secondary">See top-ups instead</button>
                <button className="btn-secondary">Switch to yearly (save 20%)</button>
              </div>
            </div>

            {/* Top-ups / overage history */}
            <div className="set-section glass">
              <div className="set-section-h">
                <div className="label">▎ Top-ups & overages</div>
                <h3>Last 90 days</h3>
                <p>One-time minute purchases when a session ran past your monthly limit.</p>
              </div>
              {[
                { date: 'Mar 14, 2026', desc: '20 min top-up · manual',          amt: '$3.99' }
              ].map((tu, i) => (
                <div className="billing-row" key={i}>
                  <span className="invoice">{tu.date}</span>
                  <span className="desc">{tu.desc}</span>
                  <span className="status-pill">Paid</span>
                  <span className="amount">{tu.amt}</span>
                </div>
              ))}
              <div style={{ marginTop: 14, paddingTop: 14, borderTop: '1px solid rgba(255,255,255,0.06)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <span style={{ fontSize: 13, color: 'var(--muted-foreground)' }}>Top-up spend (90d)</span>
                <span style={{ fontFamily: 'var(--font-mono)', fontWeight: 700, color: 'var(--accent)' }}>$3.99</span>
              </div>
            </div>

          </div>
        );
      })()}

      {settingsTab === 'security' && (
        <div className="set-section glass">
          <div className="set-section-h">
            <div className="label">▎ Security</div>
            <h3>Sign-in &amp; sessions</h3>
          </div>
          <div className="set-row">
            <div className="text">
              <div className="name">Password</div>
              <div className="desc">Last changed 38 days ago.</div>
            </div>
            <button className="btn-secondary">Change password</button>
          </div>
          <div className="set-row">
            <div className="text">
              <div className="name">Two-factor authentication</div>
              <div className="desc">Authenticator app · Backup codes generated Apr 12.</div>
            </div>
            <div className="toggle on"></div>
          </div>
          <div className="set-row">
            <div className="text">
              <div className="name">Active sessions</div>
              <div className="desc">2 browsers · last active in New York &amp; Brooklyn.</div>
            </div>
            <button className="btn-danger">Sign out all</button>
          </div>
        </div>
      )}

      <div style={{ display: 'flex', justifyContent: 'flex-end', alignItems: 'center', padding: '12px 4px' }}>
        <button className="btn-danger">Delete Zenphony account</button>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════════════
   ROOT — switch between auth / dashboard / settings via tweaks
   ════════════════════════════════════════════════════════════════════════ */
function App() {
  const [t, setTweak] = useTweaks(DEFAULTS);
  const [sessionLoading, setSessionLoading] = useState(true);
  const [sessionUser, setSessionUser] = useState(null); // { name, email } or null
  const [signOutBusy, setSignOutBusy] = useState(false);

  // Sync theme to body
  useEffect(() => {
    document.body.classList.remove('theme-velvet','theme-rosso','theme-amarillo','theme-aether','theme-verdant');
    document.body.classList.add('theme-' + t.theme);
  }, [t.theme]);

  // URL routing — single-tab integration with the marketing site.
  useEffect(() => {
    const p = new URLSearchParams(window.location.search);
    const s = p.get('screen');
    const m = p.get('mode');
    const sec = p.get('section');
    if (s && ['login','settings'].includes(s) && s !== t.screen) setTweak('screen', s);
    if (m && ['signin','signup'].includes(m) && m !== t.authMode) setTweak('authMode', m);
    if (sec && ['account','forum'].includes(sec) && sec !== t.section) setTweak('section', sec);
  }, []);

  // Session check on mount — Better Auth.
  // In preview (different origin) this fails with CORS and we keep the Tweak-driven view.
  // In production (same origin) it populates user data and swaps screen if needed.
  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const res = await window.api('/api/auth/get-session');
        if (cancelled || !res.ok) return;
        const data = await res.json();
        if (data && data.user) {
          setSessionUser({ name: data.user.name || data.user.email, email: data.user.email });
          // Only force-redirect when on the auth screen and a real session exists.
          if (t.screen === 'login') setTweak('screen', 'settings');
        } else {
          // No session: only redirect if we're somewhere that needs auth AND the page
          // is actually running on the production origin (not the design preview).
          const sameOrigin = window.location.origin === window.APP_BASE_URL;
          if (sameOrigin && t.screen !== 'login') setTweak('screen', 'login');
        }
      } catch (e) {
        // CORS in preview iframe — leave the design exactly as-is.
      } finally {
        if (!cancelled) setSessionLoading(false);
      }
    })();
    return () => { cancelled = true; };
  }, []);

  const handleRealSignOut = async () => {
    const IS_PROD = window.location.origin === window.APP_BASE_URL;
    if (!IS_PROD) {
      // Preview mode: just flip back to the auth screen, don't bounce to Vercel.
      setSessionUser(null);
      setTweak('screen', 'login');
      return;
    }
    setSignOutBusy(true);
    try {
      await window.api('/api/auth/sign-out', { method: 'POST', body: JSON.stringify({}) });
    } catch (_) {}
    window.location.href = window.APP_BASE_URL + '/';
  };

  const displayName = (sessionUser && sessionUser.name) || t.user;

  let content;
  if (t.screen === 'login') {
    content = <AuthScreen
      mode={t.authMode}
      setMode={(m) => setTweak('authMode', m)}
      onSignIn={() => setTweak('screen', 'settings')} />;
  } else {
    const inner = t.section === 'forum'
      ? (
          <div className="app-main">
            <Forum
              user={displayName}
              view={t.forumView}
              setView={(v) => setTweak('forumView', v)}
              categoryId={t.forumCategory}
              setCategoryId={(v) => setTweak('forumCategory', v)}
              threadId={t.forumThread}
              setThreadId={(v) => setTweak('forumThread', v)} />
          </div>
        )
      : (
          <Settings user={displayName}
                    sessionEmail={sessionUser ? sessionUser.email : null}
                    theme={t.theme}
                    setTheme={(v) => setTweak('theme', v)}
                    settingsTab={t.settingsTab}
                    setSettingsTab={(v) => setTweak('settingsTab', v)}
                    onSignOut={handleRealSignOut} />
        );
    content = (
      <div className="acct-shell">
        <AccountHeader user={displayName}
                       section={t.section}
                       setSection={(v) => setTweak('section', v)}
                       onSignOut={handleRealSignOut} />
        {inner}
      </div>
    );
  }

  return (
    <>
      {content}
      <TweaksPanel title="Tweaks">
        <TweakSection label="Screen" />
        <TweakRadio
          label="Show"
          value={t.screen}
          options={[
            { value: 'login',    label: 'Auth' },
            { value: 'settings', label: 'Account' }
          ]}
          onChange={(v) => setTweak('screen', v)} />

        {t.screen === 'login' && (
          <TweakRadio
            label="Auth mode"
            value={t.authMode}
            options={[
              { value: 'signin', label: 'Sign in' },
              { value: 'signup', label: 'Sign up' }
            ]}
            onChange={(v) => setTweak('authMode', v)} />
        )}
        {t.screen === 'settings' && (
          <TweakRadio
            label="Section"
            value={t.section}
            options={[
              { value: 'account', label: 'Account' },
              { value: 'forum',   label: 'Community' }
            ]}
            onChange={(v) => setTweak('section', v)} />
        )}

        {t.screen === 'settings' && t.section === 'account' && (
          <TweakSelect
            label="Settings tab"
            value={t.settingsTab}
            options={[
              { value: 'profile', label: 'Profile' },
              { value: 'devices', label: 'Devices' },
              { value: 'downloads', label: 'Downloads' },
              { value: 'billing', label: 'Billing' },
              { value: 'usage', label: 'Usage' },
              { value: 'security', label: 'Security' }
            ]}
            onChange={(v) => setTweak('settingsTab', v)} />
        )}

        {t.screen === 'settings' && t.section === 'forum' && (
          <>
            <TweakRadio
              label="Forum view"
              value={t.forumView}
              options={[
                { value: 'home',     label: 'Home' },
                { value: 'category', label: 'Category' },
                { value: 'thread',   label: 'Thread' }
              ]}
              onChange={(v) => setTweak('forumView', v)} />
            {(t.forumView === 'category' || t.forumView === 'thread') && (
              <TweakSelect
                label="Category"
                value={t.forumCategory}
                options={[
                  { value: 'test-drive-1', label: 'Test Drive #1' },
                  { value: 'latest-beta',  label: 'Latest Beta' },
                  { value: 'bugs',         label: 'Bug Reports' },
                  { value: 'features',     label: 'Feature Requests' },
                  { value: 'modes',        label: 'Listening Modes' },
                  { value: 'daw',          label: 'DAW & Install' },
                  { value: 'examples',     label: 'Audio Examples' },
                  { value: 'lounge',       label: 'Lounge' }
                ]}
                onChange={(v) => setTweak('forumCategory', v)} />
            )}
          </>
        )}

        <TweakSection label="Theme" />
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 6, padding: '4px 0' }}>
          {['velvet','rosso','amarillo','aether','verdant'].map(name => {
            const grads = {
              velvet:   'linear-gradient(135deg, hsl(265,80%,65%), hsl(220,90%,65%))',
              rosso:    'linear-gradient(135deg, hsl(12,85%,65%), hsl(350,80%,60%))',
              amarillo: 'linear-gradient(135deg, hsl(42,95%,60%), hsl(30,90%,58%))',
              aether:   'linear-gradient(135deg, hsl(188,85%,55%), hsl(215,80%,60%))',
              verdant:  'linear-gradient(135deg, hsl(142,70%,50%), hsl(90,75%,55%))'
            };
            return (
              <div key={name}
                onClick={() => setTweak('theme', name)}
                title={name}
                style={{
                  aspectRatio: '1',
                  borderRadius: 8,
                  cursor: 'pointer',
                  background: grads[name],
                  border: t.theme === name ? '2px solid #29261b' : '2px solid transparent',
                  boxShadow: t.theme === name ? '0 0 0 2px rgba(255,255,255,0.6)' : 'none'
                }} />
            );
          })}
        </div>

        <TweakSection label="User" />
        <TweakText label="Name" value={t.user} onChange={(v) => setTweak('user', v)} />
      </TweaksPanel>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

</body>
</html>
