<body class="theme-velvet admin">
<style id="admin-gate-style">html { visibility: hidden; }</style>
<script>
/* Admin access gate — server-side check via /api/admin/check-access.
   Only profiles.is_admin = true unlock the console. The hidden-html
   style above prevents the admin shell from flashing on non-admin devices. */
(function () {
  fetch('/api/admin/check-access', { credentials: 'include' })
    .then(function (r) { return r.ok ? r.json() : null; })
    .then(function (d) {
      if (!d || !d.isAdmin) { window.location.replace('/account'); return; }
      window.__ADMIN_EMAIL__ = d.email || '';
      var s = document.getElementById('admin-gate-style');
      if (s) s.parentNode.removeChild(s);
    })
    .catch(function () { window.location.replace('/account'); });
})();
</script>
